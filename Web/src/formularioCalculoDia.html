<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Cálculo de Día</title>
</head>
<body>
    <h2>Introduce una fecha</h2>
    <form action="//WEB-INF/CalculaDiaSemana.jsp" method="get">
        Día: <input type="number" name="dia" min="1" max="31" required><br><br>
        Mes: <input type="number" name="mes" min="1" max="12" required><br><br>
        Año: <input type="number" name="anio" required><br><br>
        <input type="submit" value="Calcular">
    </form>
</body>
</html>
